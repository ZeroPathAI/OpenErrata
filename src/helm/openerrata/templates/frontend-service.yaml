{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openerrata.fullname" . }}-frontend
  annotations:
    {{- if .Values.frontend.service.skipAwait }}
    pulumi.com/skipAwait: "true"
    {{- end }}
  labels:
    {{- include "openerrata.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "openerrata.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
